name: Gerenciar Calendário E-sports

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Ação a executar'
        required: true
        default: 'atualizar'
        type: choice
        options:
          - atualizar
          - deletar-cs2
          - limpar-tudo

permissions:
  contents: write
  actions: read

jobs:
  gerenciar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Atualizar calendário
        if: github.event.inputs.action == 'atualizar'
        env:
          SCRAPE_DO_API_KEY: ${{ secrets.SCRAPE_DO_API_KEY }}
        run: python generate_ics.py

      - name: Deletar eventos CS2
        if: github.event.inputs.action == 'deletar-cs2'
        run: python delete_cs2.py

      - name: Limpar calendário inteiro
        if: github.event.inputs.action == 'limpar-tudo'
        run: |
          rm -f calendar.ics
          echo "✅ Calendário deletado"

      - name: Commit e Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add calendar.ics state.json
          if git diff --cached --quiet; then
            echo "✅ Nenhuma mudança"
          else
            git commit -m "[${{ github.event.inputs.action }}] $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            git push
            echo "✅ Commitado"
          fi
